<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#ff7a9f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Love Letters">
    <title>Saved Love Letters</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="heart.png" type="image/x-icon">
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBCtXcHiFPNYBdxSmkZ_jOhMppAHg__zn0",
            authDomain: "amor-3.firebaseapp.com",
            projectId: "amor-3",
            storageBucket: "amor-3.firebasestorage.app",
            messagingSenderId: "43156301284",
            appId: "1:43156301284:web:2ddc5ab26086de8e1353f1",
            measurementId: "G-MC15X3NW5W"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Expose Firebase functions globally
        window.firebaseDB = db;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.onSnapshot = onSnapshot;
        window.collection = collection;
        window.query = query;
        window.orderBy = orderBy;
    </script>
</head>
<body>
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-card">
            <h2>Unlock saved letters</h2>
            <p>Enter the shared password to view the archive.</p>
            <form id="passwordForm">
                <label for="archivePassword">Password</label>
                <input type="password" id="archivePassword" placeholder="Enter password" required>
                <button type="submit">Open letters</button>
            </form>
            <button id="cancelUnlock" class="secondary-button" type="button">Go back</button>
        </div>
    </div>
    <div class="container">
        <header>
            <h1>Saved Letters</h1>
            <p class="lead">The letters which we will cherish forever!!</p>
        </header>

        <section class="letter-panel">
            <p><a class="page-link" href="index.html">← Write a new letter</a></p>
            <div class="letters-list"></div>
            <div class="empty-state">No saved letters yet. Go back and write the first love letter.</div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
